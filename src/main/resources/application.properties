spring.application.name=ArgenticPptMaster
ppt-master.repo-path=/home/zhang/PycharmProjects/ppt-master
ppt-master.workspace-path=var/ppt-master
ppt-master.python-command=/media/zhang/E/venvs/ppt-master/bin/python
ppt-master.command-timeout=10m
# AgentScope 模型配置。
# 支持两种写法：
# 1) 单一模型兼容模式（保留历史字段）：
#    agentscope.provider=openai
#    agentscope.model-name=gpt5.4
#    agentscope.api-key=${OPENAI_API_KEY}
#    agentscope.base-url=http://localhost:4000/v1
# 2) 模型组模式（推荐，支持 fallback）：
#    agentscope.primary.provider=openai
#    agentscope.primary.model-name=gpt5.4
#    agentscope.primary.api-key=${OPENAI_API_KEY}
#    agentscope.primary.base-url=http://localhost:4000/v1
#    agentscope.fallbacks[0].provider=openai
#    agentscope.fallbacks[0].model-name=gpt-4o-mini
#    agentscope.fallbacks[0].api-key=${OPENAI_API_KEY}
#    agentscope.fallbacks[0].base-url=http://localhost:4000/v1
#
# 执行策略（可选）：
# agentscope.execution.max-attempts=3
# agentscope.execution.initial-backoff=1s
# agentscope.execution.max-backoff=10s
# agentscope.execution.timeout=120s
agentscope.provider=openai
agentscope.model-name=openai-gpt-5.6-terra
agentscope.api-key=sk-NTcsVVM3BUrskvOE9jLUnu349iVL2GxxrHoSUtdz2vjOTP9G
agentscope.base-url=http://192.168.99.2:4000/v1
agentscope.fallbacks[0].provider=openai
agentscope.fallbacks[0].model-name=kimi-k2.7-code
agentscope.fallbacks[0].api-key=sk-NTcsVVM3BUrskvOE9jLUnu349iVL2GxxrHoSUtdz2vjOTP9G
agentscope.fallbacks[0].base-url=http://192.168.99.2:4000/v1

agentscope.max-iters=48
agentscope.session-store-path=var/ppt-master/agent-sessions
agentscope.service-user-id=ppt-master-service
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=300MB
logging.file.name=var/ppt-master/logs/application.log

# Dev fixed access context (no real auth). Set enabled=false when wiring a real resolver.
ppt-master.local-access.enabled=true
ppt-master.local-access.subject-id=dev-user
ppt-master.local-access.tenant-id=dev-tenant
ppt-master.local-access.roles=ADMIN

ppt-master.template-fill-enabled=true
ppt-master.template-fill-production.execution-stop-enabled=false
# Template-fill production rollout (default closed)
ppt-master.template-fill-admin-role=ADMIN
ppt-master.template-fill-production.cleanup-dry-run-enabled=true
ppt-master.template-fill-production.cleanup-deletion-enabled=true
ppt-master.template-fill-production.diagnostics-enabled=true

ppt-master.template-fill-production.retention-completed=7d
ppt-master.template-fill-production.retention-failed=14d
ppt-master.template-fill-production.retention-diagnostic=7d

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.probes.enabled=true
